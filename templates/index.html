<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestionFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="page">
    <nav>
      <div class="logo">
        <span class="logo-q">Q</span>
        <span class="logo-text">uestionFinder</span>
      </div>
    </nav>

    <main class="hero">
      <h1 class="tagline">Upload a question,<br>discover its <em>where its from</em></h1>
      <p class="subtitle">Supports PNG, JPG, WEBP, GIF &amp; more</p>

      <div class="dropzone-wrap">
        <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Drop your image here or click to browse">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16V4m0 0-3.5 3.5M12 4l3.5 3.5"/>
              <path d="M3 16v1a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-1"/>
            </svg>
          </div>
          <span class="drop-label">Drop your image here</span>
          <span class="drop-sub">or click to browse files</span>
        </div>
        <input type="file" id="fileInput" name="image" accept="image/*" />

        <div class="cta">
          <button class="btn-primary" id="submitBtn" disabled>Analyse Image</button>
          <button class="btn-clear" id="clearBtn">Clear</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
